{% extends "base.html" %}
{% block title %}Xuất Excel{% endblock %}
{% block content %}
<h2 class="mb-4">Xuất File Excel</h2>

<div class="card mb-4">
    <div class="card-body">
        <form id="period-form" class="row g-3 align-items-end">
            <div class="col-auto">
                <label class="form-label fw-semibold">Tháng</label>
                <select name="month" class="form-select" style="width:130px">
                    {% for m in range(1, 13) %}
                    <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>Tháng {{ m }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label fw-semibold">Năm</label>
                <select name="year" class="form-select" style="width:110px">
                    {% for y in range(current_year - 3, current_year + 2) %}
                    <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button
                    type="button"
                    class="btn btn-primary"
                    hx-get="/exports/preview"
                    hx-include="#period-form"
                    hx-target="#preview-container"
                    hx-indicator="#loading"
                    hx-on:htmx:response-error="document.getElementById('preview-container').innerHTML='<div class=\'alert alert-danger\'>Không thể tải dữ liệu. Vui lòng thử lại.</div>'"
                >
                    Xem
                </button>
            </div>
            <div class="col-auto">
                <span id="loading" class="htmx-indicator text-secondary">
                    <span class="spinner-border spinner-border-sm me-1"></span>Đang tải...
                </span>
            </div>
        </form>
    </div>
</div>

<div id="preview-container">
    <div class="text-muted text-center py-5">
        Chọn tháng/năm rồi nhấn <strong>Xem</strong> để xem trước dữ liệu.
    </div>
</div>
{% endblock %}
